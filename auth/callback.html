<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redirecting — GlbTOKEN</title>
<meta name="robots" content="noindex,nofollow" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://glbtoken-backend-production.up.railway.app https://glbtoken1.us.auth0.com; img-src 'self'; font-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'" />
<link rel="icon" type="image/x-icon" href="../favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0B14;color:#cdd6f4;font-family:Inter,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.spinner{width:32px;height:32px;border:3px solid #313244;border-top-color:#F4B400;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:#161822;border:1px solid #2a2b3d;border-radius:12px;padding:2rem;text-align:center;max-width:360px}
.card p{margin-top:1rem;color:#7f8490;font-size:0.9rem}
</style>
</head>
<body>
<div class="card">
<div class="spinner"></div>
<p>Completing sign in...</p>
</div>
<script>
(function() {
  var API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:8000' : 'https://glbtoken-backend-production.up.railway.app';

  // Hardcoded Auth0 config — no fetch to Railway needed
  var AUTH0_DOMAIN = 'glbtoken1.us.auth0.com';
  var AUTH0_CLIENT_ID = 'hJDPj23ouSgJrNzUY83EQbQzih8pamls';

  // ====== DETECT AUTH FLOW TYPE ======
  var queryParams = new URLSearchParams(window.location.search);
  var hashParams = window.location.hash ? new URLSearchParams(window.location.hash.substring(1)) : null;

  var code = queryParams.get('code');
  var idToken = hashParams ? hashParams.get('id_token') : null;
  var error = queryParams.get('error') || (hashParams ? hashParams.get('error') : null);
  var returnedState = queryParams.get('state') || (hashParams ? hashParams.get('state') : null);
  var codeVerifier = sessionStorage.getItem('gt_code_verifier');
  var storedState = sessionStorage.getItem('gt_oauth_state');

  // Handle Auth0 error response
  if (error) {
    window.location.replace('/login.html?error=' + encodeURIComponent(error));
    return;
  }

  // Verify CSRF state for both flows
  if (storedState && returnedState && returnedState !== storedState) {
    window.location.replace('/login.html?error=state_mismatch');
    return;
  }
  sessionStorage.removeItem('gt_oauth_state');

  // ====== FLOW A: PKCE Code Flow (?code=xxx) ======
  if (code) {
    sessionStorage.removeItem('gt_code_verifier');
    if (!codeVerifier) {
      window.location.replace('/login.html?error=no_code_verifier');
      return;
    }

    // Exchange code directly with Auth0 (no Railway fetch needed)
    fetch('https://' + AUTH0_DOMAIN + '/oauth/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        grant_type: 'authorization_code',
        client_id: AUTH0_CLIENT_ID,
        code: code,
        code_verifier: codeVerifier,
        redirect_uri: window.location.origin + '/auth/callback.html'
      })
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.error_description || 'Token exchange failed'); });
      return r.json();
    })
    .then(function(tokens) {
      if (!tokens || !tokens.id_token) throw new Error('No id_token in response');
      // POST id_token to Railway for JWT exchange
      return fetch(API_URL + '/api/auth/auth0/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token: tokens.id_token})
      });
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || 'Auth0 login failed'); });
      return r.json();
    })
    .then(function(data) {
      if (data && data.token) {
        localStorage.setItem('gt_token', data.token);
        if (data.user) localStorage.setItem('gt_user', JSON.stringify(data.user));
        window.location.replace(window.location.origin + '/dashboard.html');
      } else {
        window.location.replace('/login.html?error=Invalid+server+response');
      }
    })
    .catch(function(e) {
      window.location.replace('/login.html?error=' + encodeURIComponent(e.message || 'Login failed'));
    });
    return;
  }

  // ====== FLOW B: Implicit Flow (#id_token=xxx) ======
  if (idToken) {
    history.replaceState(null, document.title, window.location.pathname + window.location.search);

    sessionStorage.setItem('gt_temp_token', idToken);
    sessionStorage.setItem('gt_auth_pending', Date.now().toString());

    fetch(API_URL + '/api/auth/auth0/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: idToken})
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || 'Auth0 login failed'); });
      return r.json();
    })
    .then(function(data) {
      if (data && data.token) {
        localStorage.setItem('gt_token', data.token);
        if (data.user) localStorage.setItem('gt_user', JSON.stringify(data.user));
        sessionStorage.removeItem('gt_temp_token');
        sessionStorage.removeItem('gt_auth_pending');
        window.location.replace(window.location.origin + '/dashboard.html');
      } else {
        window.location.replace('/login.html?error=Invalid+server+response');
      }
    })
    .catch(function(e) {
      window.location.replace('/login.html?error=' + encodeURIComponent(e.message || 'Login failed'));
    });
    return;
  }

  // ====== NO AUTH DATA FOUND ======
  window.location.replace('/login.html?error=no_auth_response');
})();
</script>
</body>
</html>
