<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="36" height="36">
  <!-- Global Token (GbT) Logo v2
       Standing digital coin, front view.
       Outer ring → stability, value, security
       Inner segmented ring → token architecture, processing layers
       Ridged right edge → coin perspective, authenticity
       Center "GbT" monogram → brand identity
  -->
  
  <!-- Outer coin ring — thick, stable, perfectly circular -->
  <circle cx="50" cy="50" r="44" stroke="currentColor" stroke-width="6" fill="none"/>
  
  <!-- Inner segmented ring — evenly spaced arcs for depth + token architecture -->
  <circle cx="50" cy="50" r="34" stroke="currentColor" stroke-width="3" fill="none"
    stroke-dasharray="5.3 5.3"/>
  
  <!-- Coin edge ridges (right side — milled edge for depth/perspective) -->
  <line x1="92" y1="24" x2="96" y2="22" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="93" y1="30" x2="97" y2="28" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="94" y1="36" x2="98" y2="34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="94.5" y1="42" x2="98.5" y2="40" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="94.5" y1="48" x2="98.5" y2="46" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="94.5" y1="54" x2="98.5" y2="52" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="94" y1="60" x2="98" y2="58" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="93" y1="66" x2="97" y2="64" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="72" x2="96" y2="70" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  
  <!-- "GbT" Monogram — custom geometric lettering -->
  <!-- G: large, rounded, global reach -->
  <path d="M36 38 C32 38 28 42 28 48 C28 54 32 58 36 58 L36 50 L40 50 L40 58 C42 58 44 57 45 55" 
        stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="40" y1="50" x2="36" y2="50" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
  
  <!-- b: lowercase, bridge between G and T -->
  <path d="M50 38 L50 58" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M50 54 C50 58 54 60 57 58 C60 56 60 52 57 50 C54 48 50 50 50 54" 
        stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  
  <!-- T: horizontal top for stability, vertical stroke -->
  <path d="M64 38 L74 38" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="69" y1="38" x2="69" y2="58" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
</svg>
