<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Global Token (GbT) Logo
       Reference-based recreation of circular coin/seal design.
       Outer solid ring → stability, value, security
       8-tooth segmented decorative ring → token architecture, precision
       Interconnected "GbT" monogram → brand identity
       Single-color currentColor for dark/light mode compatibility.
  -->

  <!-- OUTER RING — thick solid ring, 14px radial width (r=93 outer, r=79 inner) -->
  <circle cx="100" cy="100" r="93" stroke="currentColor" stroke-width="14" fill="none"/>

  <!-- SEGMENTED DECORATIVE RING — 8 gear-like teeth, r=62 to r=79 -->
  <!-- Each tooth is a filled arc from inner radius 62 to outer radius 79 -->
  <g fill="currentColor">
    <!-- Upper-right: 2 teeth spanning ~25°–50° and ~50°–75° -->
    <path d="M 100 100 L 149 68 A 79 79 0 0 1 163 90 L 135 82 A 62 62 0 0 0 126 66 Z"/>
    <path d="M 100 100 L 163 90 A 79 79 0 0 1 163 115 L 135 106 A 62 62 0 0 0 135 85 Z"/>
    
    <!-- Lower-right: 2 teeth spanning ~105°–130° and ~130°–155° -->
    <path d="M 100 100 L 160 130 A 79 79 0 0 1 145 155 L 122 132 A 62 62 0 0 0 132 116 Z"/>
    <path d="M 100 100 L 145 155 A 79 79 0 0 1 115 165 L 100 140 A 62 62 0 0 0 122 132 Z"/>
    
    <!-- Gap at ~180° (left) — G letter extends here, no segment needed -->
    
    <!-- Lower-left: 2 teeth spanning ~205°–230° and ~230°–255° -->
    <path d="M 100 100 L 70 160 A 79 79 0 0 1 48 150 L 56 130 A 62 62 0 0 0 75 138 Z"/>
    <path d="M 100 100 L 48 150 A 79 79 0 0 1 33 120 L 52 108 A 62 62 0 0 0 62 126 Z"/>
    
    <!-- Upper-left: 2 teeth spanning ~300°–325° and ~325°–350° -->
    <path d="M 100 100 L 38 65 A 79 79 0 0 1 55 40 L 70 54 A 62 62 0 0 0 56 70 Z"/>
    <path d="M 100 100 L 55 40 A 79 79 0 0 1 82 30 L 75 52 A 62 62 0 0 0 64 44 Z"/>
  </g>

  <!-- CENTER GbT MONOGRAM — three interconnected letters -->
  <g fill="currentColor">
    
    <!-- Letter "G" — left side, largest element
         A thick "C" shape spanning from upper-left around through left to lower-left
         with an enclosed counter (open center of the G) -->
    <path d="
      M 96 36
      C 78 36, 62 44, 50 58
      C 38 74, 34 90, 34 104
      C 34 122, 40 140, 52 154
      C 64 166, 78 170, 94 170
      C 108 170, 120 165, 130 156
      L 120 140
      C 112 146, 104 150, 94 150
      C 82 150, 72 145, 64 136
      C 56 126, 52 114, 52 102
      C 52 90, 56 78, 64 68
      C 72 58, 82 54, 94 54
      C 104 54, 112 58, 118 64
      L 118 88
      L 94 88
      L 94 104
      L 134 104
      L 134 70
      C 128 56, 116 46, 104 40
      C 100 38, 98 36, 96 36
      Z"/>
      
    <!-- Letter "b" — right side, vertical stem + enclosed circular bowl
         The stem runs from bottom upward; the bowl encloses at top-right -->
    <path d="
      M 136 56
      L 136 162
      L 152 162
      L 152 118
      C 156 126, 164 134, 174 134
      C 186 134, 196 124, 196 110
      C 196 98, 188 88, 176 86
      C 168 85, 160 88, 156 96
      L 156 80
      C 154 70, 146 62, 138 56
      Z
      M 156 106
      C 156 98, 160 94, 168 94
      C 176 94, 180 100, 180 108
      C 180 116, 176 122, 168 122
      C 162 122, 156 116, 156 106
      Z"/>
      
    <!-- Letter "T" — bottom, wide horizontal bar with short vertical stem
         Positioned at the base, connecting the G and b footprints -->
    <path d="
      M 70 162
      L 160 162
      L 160 174
      L 128 174
      L 128 202
      L 112 202
      L 112 174
      L 70 174
      Z"/>
  </g>
</svg>
